title: kamae-ts
description: Kamae (構え) — robust server-side TypeScript design harness
url: https://iwasa-kosui.github.io
baseurl: /kamae-ts
twitter:
  card: summary_large_image
defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-image.png
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-seo-tag
relative_links:
  enabled: true
  collections: false

# just-the-docs settings
search_enabled: true
heading_anchors: true
color_scheme: light
aux_links:
  GitHub:
    - https://github.com/iwasa-kosui/kamae-ts
  Discord:
    - https://discord.gg/Z9HVbqEWzd

include:
  - ja
  - ja/result-libraries
  - ja/validation-libraries
  - en
  - en/result-libraries
  - en/validation-libraries
exclude:
  - superpowers
  - adr
