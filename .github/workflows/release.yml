name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, e.g. 1.2.3 — leading "v" is stripped)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs and branch
        id: validate
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid semver: $version"
            exit 1
          fi
          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::Tag $tag already exists"
            exit 1
          fi
          if [[ "$REF_NAME" != "main" ]]; then
            echo "::error::Releases must be cut from main (dispatched from: $REF_NAME)"
            exit 1
          fi
          {
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Sync version in package.json and plugin.json
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const v = process.env.VERSION;
            for (const f of ["package.json", ".claude-plugin/plugin.json"]) {
              const j = JSON.parse(fs.readFileSync(f, "utf8"));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + "\n");
            }
          '
          git diff --stat

      - name: Commit, tag, and push
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json .claude-plugin/plugin.json
          git commit -m "chore(release): $TAG"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.validate.outputs.tag }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          args=("$TAG" --title "$TAG" --generate-notes)
          [[ "$DRAFT" == "true" ]] && args+=(--draft)
          [[ "$PRERELEASE" == "true" ]] && args+=(--prerelease)
          gh release create "${args[@]}"
